<!DOCTYPE html>
<!-- Define que o documento usa HTML5 -->

<html lang="pt-BR">
<!-- Define o idioma da página como português do Brasil -->

<head>
    <meta charset="UTF-8">
    <!-- Define a codificação de caracteres (permite acentos e caracteres especiais) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Permite que a página seja responsiva em celulares e tablets -->

    <title>{% block titulo %}{% endblock %}</title>
    <!-- 
    Bloco de título do Jinja (Flask).
    Cada página que herdar este template pode definir seu próprio título.
    -->

    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Importa o CSS do Bootstrap pela internet para usar estilos prontos -->
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<!-- 
navbar → componente de navegação do Bootstrap
navbar-expand-lg → expande o menu em telas grandes
navbar-dark → estilo para fundo escuro
bg-dark → fundo escuro
-->

  <div class="container-fluid">
  <!-- Container que ocupa toda a largura da tela -->

    <a class="navbar-brand" href="#">Meu Site</a>
    <!-- Nome ou logo do site na navbar -->

    <div class="collapse navbar-collapse">
    <!-- Área que contém os links do menu -->

      <ul class="navbar-nav me-auto">
      <!-- 
      navbar-nav → lista de navegação
      me-auto → margem automática à direita para alinhar os itens
      -->

        <li class="nav-item">
          <a class="nav-link" href="/home">Home</a>
        </li>
        <!-- Link para a página Home -->

        <li class="nav-item">
          <a class="nav-link" href="/produtos">Produtos</a>
        </li>
        <!-- Link para a página de produtos -->

        <li class="nav-item">
          <a class="nav-link" href="/perfil">Perfil</a>
        </li>
        <!-- Link para a página de perfil do usuário -->

      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
<!-- 
container → centraliza o conteúdo da página
mt-5 → margem superior para criar espaço após a navbar
-->

    {% block conteudo %}{% endblock %}
    <!-- 
    Bloco de conteúdo do template.
    As páginas que usam este layout inserem aqui o conteúdo principal.
    -->

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-5">
<!-- 
bg-dark → fundo escuro
text-white → texto branco
text-center → centraliza o texto
py-3 → espaçamento vertical
mt-5 → margem superior
-->
    Rodapé
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Importa o JavaScript do Bootstrap para ativar componentes interativos -->
</body>
</html>
