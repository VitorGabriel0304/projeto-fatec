<!DOCTYPE html>
<!-- Define que o documento usa HTML5 -->

<html lang="pt-BR">
<!-- Início do documento HTML e define o idioma como português do Brasil -->

<head>
  <meta charset="UTF-8">
  <!-- Define a codificação de caracteres como UTF-8 (suporta acentos e caracteres especiais) -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Faz a página se adaptar corretamente a dispositivos móveis (responsividade) -->

  <title>Página Início</title>
  <!-- Título que aparece na aba do navegador -->

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Importa o CSS do Bootstrap para usar estilos prontos como botões, containers, etc -->
</head>

<body class="bg-dark d-flex align-items-center justify-content-center vh-100">
<!-- 
bg-dark → fundo escuro
d-flex → ativa o sistema flexbox
align-items-center → centraliza verticalmente
justify-content-center → centraliza horizontalmente
vh-100 → altura da tela inteira (100% da viewport)
-->

  <div class="container">
  <!-- Container do Bootstrap que centraliza e organiza o conteúdo -->

    <div class="card shadow-lg border-0 mx-auto text-center p-4" style="max-width: 500px;">
    <!-- 
    card → cria um cartão visual do Bootstrap
    shadow-lg → adiciona uma sombra grande
    border-0 → remove a borda padrão
    mx-auto → centraliza horizontalmente
    text-center → centraliza o texto
    p-4 → adiciona espaçamento interno
    max-width:500px → limita a largura do card
    -->

      <h1 class="mb-3 fw-bold">Página de Início</h1>
      <!-- 
      mb-3 → margem inferior
      fw-bold → deixa o texto em negrito
      -->

      <p class="text-muted">
      <!-- text-muted deixa o texto mais suave (cinza claro) -->
        Aqui vai o conteúdo inicial do sistema.
      </p>

      <a href="/index" class="btn btn-primary btn-lg mt-3">
      <!-- 
      a → link de navegação
      href="/index" → direciona para a página index
      btn → transforma em botão
      btn-primary → cor principal do Bootstrap (azul)
      btn-lg → botão grande
      mt-3 → margem superior
      -->
        Ir para Index
      </a>

    </div>
  </div>

</body>
</html>
